<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#C9A84C"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Gold Calc"/>
<meta name="description" content="Multi-shop gold jewellery price calculator with live rates"/>
<title>Gold Jewellery Calculator</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* ═══════════════════════════════════════
   TOKENS
═══════════════════════════════════════ */
:root {
  --gold:#C9A84C; --gold-l:#E8C97A; --dark:#0E0C09; --card:#1A1710;
  --border:#2E2A20; --inp:#211E16; --text:#F0E6CC; --muted:#8C8070;
  --dim:#4A4540; --red:#D44B3F; --green:#5BBF8E; --blue:#5B9BBF;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{
  background:var(--dark); font-family:'DM Sans',sans-serif;
  color:var(--text); min-height:100vh; max-width:480px;
  margin:0 auto; padding-bottom:calc(20px + var(--safe-bot));
  -webkit-tap-highlight-color:transparent; overscroll-behavior:none;
}

/* ═══════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════ */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes anim-up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(8px)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}

.anim-up{animation:anim-up .3s ease both}

/* ═══════════════════════════════════════
   INSTALL BANNER
═══════════════════════════════════════ */
#installBanner{
  display:none; background:linear-gradient(135deg,#1E1B0E,#141208);
  border-bottom:1px solid var(--gold); padding:10px 14px;
  align-items:center; gap:10px; position:sticky; top:0; z-index:50;
}
.ib-icon{font-size:20px}
.ib-text{flex:1}
.ib-text strong{display:block;font-size:13px;color:var(--gold-l)}
.ib-text span{font-size:11px;color:var(--muted)}
.ib-btn{background:var(--gold);border:none;color:#0E0C09;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.ib-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 4px;line-height:1}

/* ═══════════════════════════════════════
   HEADER
═══════════════════════════════════════ */
.header{
  background:linear-gradient(160deg,#1E1A10,#0E0C09);
  border-bottom:1px solid var(--border);
  padding:calc(14px + var(--safe-top)) 16px 12px;
  text-align:center; position:sticky; top:0; z-index:30;
}
.header-icon{font-size:18px;margin-bottom:2px}
.header h1{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;letter-spacing:.05em;color:var(--gold-l)}
.header p{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:1px}

/* ═══════════════════════════════════════
   LIVE RATE BANNER
═══════════════════════════════════════ */
.live-banner{margin:10px 12px 0;background:#141210;border:1px solid var(--border);border-radius:10px;padding:9px 13px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.lb-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.lb-dot-wrap{display:flex;align-items:center;gap:5px}
#sourceDot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.source-tag{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}
.source-tag.loading #sourceDot{animation:pulse 1s infinite}
#sourceLabel{font-size:11px;color:var(--muted)}
.lb-rate-val{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:700;color:var(--gold-l);margin-left:2px}
.lb-ref{font-size:10px;color:var(--dim);background:var(--border);padding:2px 7px;border-radius:20px}
#rateTime{font-size:10px;color:var(--dim)}

.update-btn{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);color:var(--gold-l);border-radius:7px;padding:7px 11px;font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;flex-shrink:0;white-space:nowrap}
.update-btn .spin{display:inline-block;font-size:13px}
.update-btn.loading .spin{animation:spin .7s linear infinite}

.rate-chips{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.r-chip{flex:1;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:7px;padding:5px 7px;text-align:center}
.r-chip .rl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em}
.r-chip .rv{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:600;color:var(--muted);margin-top:1px}
.r-chip .rv.active{color:var(--gold-l)}

/* ═══════════════════════════════════════
   TABS
═══════════════════════════════════════ */
.tabs-wrapper{margin:10px 12px 0}
.tab-bar{display:flex;overflow-x:auto;scrollbar-width:none;background:#141210;border:1px solid var(--border);border-radius:10px;padding:4px;gap:0}
.tab-bar::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:8px 11px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);white-space:nowrap;border:1px solid transparent;transition:background .2s,color .2s;user-select:none}
.tab.active{background:var(--card);color:var(--gold-l);border-color:var(--border)}
.tab.summary-tab{color:var(--blue)}
.tab.summary-tab.active{color:var(--blue);border-color:rgba(91,155,191,.3)}
.tab-del{width:15px;height:15px;border-radius:50%;background:rgba(212,75,63,.12);border:none;color:var(--red);font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;transition:background .2s}
.tab-del:hover{background:rgba(212,75,63,.3)}
#addShopBtn{flex-shrink:0;display:flex;align-items:center;gap:4px;padding:8px 11px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;color:var(--gold);background:transparent;border:1px dashed rgba(201,168,76,.3);white-space:nowrap;margin-left:3px;transition:border-color .2s}
#addShopBtn:hover{border-color:var(--gold)}
.copy-all-btn{width:100%;margin-top:7px;background:rgba(91,155,191,.06);border:1px dashed rgba(91,155,191,.3);color:var(--blue);border-radius:8px;padding:9px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:background .2s}
.copy-all-btn:hover{background:rgba(91,155,191,.12)}

/* ═══════════════════════════════════════
   CARDS
═══════════════════════════════════════ */
.card{margin:10px 12px 0;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.card-header{padding:10px 14px;background:#1F1C12;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.card-header h2{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;color:var(--gold-l);letter-spacing:.04em}
.card-badge{margin-left:auto;font-size:10px;color:var(--muted);background:var(--border);padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em}
.card-body{padding:13px}

/* ═══════════════════════════════════════
   SHOP NAME ROW
═══════════════════════════════════════ */
.shop-name-row{display:flex;align-items:center;gap:8px;margin-bottom:11px;background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:8px 11px}
.sn-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}

/* ═══════════════════════════════════════
   PER-SHOP RATE BLOCK
═══════════════════════════════════════ */
.shop-rate-block{background:linear-gradient(135deg,#1E1B0E,#161409);border:1px solid var(--gold);border-radius:10px;padding:11px 13px;margin-bottom:12px;position:relative;overflow:hidden}
.shop-rate-block::after{content:'♦';position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:40px;color:rgba(201,168,76,.05);pointer-events:none}
.srb-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.srb-input-row{display:flex;align-items:center;gap:5px}
.srb-sym{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--gold)}
.srb-input{background:transparent;border:none;outline:none;font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--gold-l);width:150px;-webkit-appearance:none}
.srb-per{font-size:11px;color:var(--dim);padding-bottom:2px}
.srb-hint{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}
.srb-hint-txt{font-size:10px;color:var(--dim)}
.srb-diff{font-size:10px;padding:2px 8px;border-radius:20px}
.srb-diff.higher{background:rgba(212,75,63,.12);color:var(--red);border:1px solid rgba(212,75,63,.2)}
.srb-diff.lower{background:rgba(91,191,142,.12);color:var(--green);border:1px solid rgba(91,191,142,.2)}
.srb-diff.same{background:rgba(255,255,255,.05);color:var(--dim);border:1px solid var(--border)}
.srb-sync{font-size:10px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);color:var(--gold);padding:3px 9px;border-radius:20px;cursor:pointer;font-family:'DM Sans',sans-serif}

/* ═══════════════════════════════════════
   FIELDS
═══════════════════════════════════════ */
.field{margin-bottom:10px}
.field label{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.field input{width:100%;background:var(--inp);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:8px 11px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.field input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.field input::placeholder{color:var(--dim)}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}

/* ═══════════════════════════════════════
   RESULT CHIPS
═══════════════════════════════════════ */
.results-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px}
.result-chip{background:#18160E;border:1px solid var(--border);border-radius:8px;padding:7px 10px}
.result-chip.span2{grid-column:span 2}
.result-chip.gold-hi{border-color:rgba(201,168,76,.3);background:rgba(201,168,76,.05)}
.r-label{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.07em}
.r-value{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--gold-l);margin-top:2px}
.result-chip.gold-hi .r-value{font-size:18px}

/* ═══════════════════════════════════════
   OLD GOLD
═══════════════════════════════════════ */
.og-entry{background:#131108;border:1px solid var(--border);border-radius:9px;padding:10px 11px;margin-bottom:9px;position:relative;animation:anim-up .2s ease both}
.og-num{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;font-weight:600}
.og-del{position:absolute;top:8px;right:8px;background:rgba(212,75,63,.1);border:1px solid rgba(212,75,63,.2);color:var(--red);border-radius:6px;width:22px;height:22px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.og-chips{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:7px}
.og-chip{background:#1A170E;border:1px solid var(--border);border-radius:6px;padding:5px 8px}
.og-chip.span2{grid-column:span 2}
.og-chip .cl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em}
.og-chip .cv{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;color:var(--muted);margin-top:1px}
.og-chip.green{border-color:rgba(91,191,142,.2)}.og-chip.green .cv{color:var(--green);font-size:16px}
.add-og-btn{width:100%;background:transparent;border:1px dashed rgba(201,168,76,.35);color:var(--gold);border-radius:7px;padding:9px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;margin-top:2px;transition:background .2s}
.add-og-btn:hover{background:rgba(201,168,76,.06)}
.og-totals{margin-top:10px;background:linear-gradient(135deg,#1E1C10,#151309);border:1px solid rgba(91,191,142,.3);border-radius:7px;padding:9px 13px;display:grid;grid-template-columns:1fr 1fr;gap:7px}
.tl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.tv{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--green);margin-top:1px}

/* ═══════════════════════════════════════
   CALC BUTTON
═══════════════════════════════════════ */
.calc-btn-wrap{margin:12px 12px 0}
.calc-btn{width:100%;padding:14px;background:linear-gradient(135deg,#D4A830,#A8862E);border:none;border-radius:11px;color:#0E0C09;font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;letter-spacing:.07em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 5px 20px rgba(201,168,76,.28);transition:transform .15s}
.calc-btn:active{transform:scale(.98)}

/* ═══════════════════════════════════════
   BREAKUP TABLE
═══════════════════════════════════════ */
.b-table{width:100%;border-collapse:collapse;font-size:12px}
.b-table th{font-size:9px;text-transform:uppercase;letter-spacing:.09em;color:var(--dim);padding:0 0 7px;text-align:left;font-weight:500;border-bottom:1px solid var(--border)}
.b-table th:not(:first-child){text-align:right}
.b-table td{padding:8px 0;border-bottom:1px solid #1C1910;vertical-align:middle}
.b-table td:not(:first-child){text-align:right}
.td-c{font-size:12px;color:var(--text)}
.td-r,.td-w{color:var(--muted);font-size:11px}
.td-v{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;color:var(--gold-l)}
.row-sub td{background:#1C1A10}
.row-sub .td-c{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--gold-l);font-weight:600}
.row-sub .td-v{font-size:15px}
.row-og td{background:rgba(91,191,142,.04)}
.row-og .td-c{color:var(--green)}.row-og .td-v{color:var(--green)}
.row-grand td{background:linear-gradient(135deg,#241F0E,#1A1709);border-top:1px solid var(--gold);padding:12px 0}
.row-grand .td-c{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;color:var(--gold-l)}
.row-grand .td-v{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--gold-l)}
.toggle-btn{margin-left:auto;font-size:11px;background:var(--inp);border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:20px;cursor:pointer;font-family:'DM Sans',sans-serif}
.expand-og-btn{font-size:10px;background:rgba(91,191,142,.1);border:1px solid rgba(91,191,142,.25);color:var(--green);padding:2px 8px;border-radius:10px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-left:7px}
.og-bd-wrap{margin:4px 0 6px;background:#0F0D08;border:1px solid rgba(91,191,142,.2);border-radius:8px;overflow:hidden}
.og-bd-wrap table{width:100%;border-collapse:collapse;font-size:11px}
.og-bd-wrap th{padding:6px 8px;font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);background:#141208;text-align:right;border-bottom:1px solid var(--border)}
.og-bd-wrap th:first-child{text-align:left}
.og-bd-wrap td{padding:7px 8px;color:var(--muted);text-align:right;border-top:1px solid #1A1710}
.og-bd-wrap td:first-child{text-align:left;color:var(--text)}
.bd-total td{color:var(--green);font-weight:600;background:rgba(91,191,142,.05)}

/* ═══════════════════════════════════════
   ACTION BUTTONS
═══════════════════════════════════════ */
.action-btn{padding:10px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:background .2s}
.action-btn.reset{background:transparent;border:1px solid var(--border);color:var(--muted)}
.action-btn.reset:hover{border-color:var(--red);color:var(--red)}
.action-btn.copy{background:rgba(91,155,191,.08);border:1px solid rgba(91,155,191,.3);color:var(--blue)}
.action-btn.copy:hover{background:rgba(91,155,191,.15)}
.snapshot-btn{width:100%;margin-top:10px;background:rgba(91,155,191,.07);border:1px solid rgba(91,155,191,.3);color:#8BBFD8;border-radius:9px;padding:11px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}

/* ═══════════════════════════════════════
   SUMMARY
═══════════════════════════════════════ */
.summary-wrap{padding:0 0 10px}
.summary-header{text-align:center;padding:14px 12px 10px}
.summary-header h2{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--gold-l)}
.summary-header p{font-size:11px;color:var(--muted);margin-top:3px}
.summary-meta{display:flex;gap:7px;margin:0 12px 12px}
.sum-chip{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 10px;text-align:center}
.sc-l{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em}
.sc-v{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--text);margin-top:2px}
.best-card{margin:0 12px 12px;background:linear-gradient(135deg,rgba(91,191,142,.1),rgba(91,191,142,.04));border:1px solid rgba(91,191,142,.3);border-radius:11px;padding:13px 15px;display:flex;align-items:center;gap:12px}
.bc-icon{font-size:22px}
.bc-label{font-size:10px;color:var(--green);text-transform:uppercase;letter-spacing:.07em}
.bc-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--gold-l);margin-top:2px}
.bc-rate{font-size:11px;color:var(--muted);margin-top:2px}
.bc-save{margin-left:auto;text-align:right;flex-shrink:0}
.bc-save-label{font-size:10px;color:var(--muted)}
.bc-save-val{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--green);margin-top:1px}
.cmp-table-wrap{margin:0 12px 12px;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.cmp-table{width:100%;border-collapse:collapse;font-size:12px}
.cmp-table th{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);padding:9px 12px;text-align:left;font-weight:500;background:#1F1C12;border-bottom:1px solid var(--border)}
.cmp-table th:not(:first-child){text-align:right}
.cmp-table td{padding:11px 12px;border-bottom:1px solid #1C1910;vertical-align:middle}
.cmp-table td:not(:first-child){text-align:right}
.cmp-table tr:last-child td{border-bottom:none}
.cmp-table .best-row td{background:rgba(91,191,142,.06)}
.shop-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
.best-badge{font-size:9px;background:rgba(91,191,142,.15);border:1px solid rgba(91,191,142,.3);color:var(--green);padding:2px 7px;border-radius:10px;margin-left:5px}
.price-cell{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;color:var(--gold-l)}
.price-cell.best{color:var(--green);font-size:16px}
.diff-cell{font-size:11px;color:var(--muted)}
.diff-cell.best{color:var(--green)}
.rate-cell-sm{font-size:11px;color:var(--muted)}
.bar-section{margin:0 12px 12px;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:13px}
.bar-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-row:last-child{margin-bottom:0}
.bar-name{font-size:11px;color:var(--text);width:65px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;background:#18160E;border-radius:4px;height:22px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px}
.bar-fill span{font-family:'Cormorant Garamond',serif;font-size:12px;font-weight:600;color:#0E0C09}
.sum-snapshot-btn{margin:0 12px;width:calc(100% - 24px);background:rgba(91,155,191,.07);border:1px solid rgba(91,155,191,.3);color:#8BBFD8;border-radius:9px;padding:12px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}

/* ═══════════════════════════════════════
   SNAPSHOT MODAL
═══════════════════════════════════════ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
.modal{background:#1A1710;border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:18px 16px calc(24px + var(--safe-bot));animation:slideUp .3s ease;max-height:90vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:var(--gold-l);text-align:center;margin-bottom:14px}
#snapCard{background:linear-gradient(145deg,#1E1C10,#141209);border:1px solid var(--gold);border-radius:12px;padding:16px;margin-bottom:14px}
.snap-shop-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--gold-l);text-align:center}
.snap-date{font-size:10px;color:var(--muted);text-align:center;margin-bottom:12px;text-transform:uppercase;letter-spacing:.07em;margin-top:2px}
.snap-divider{height:1px;background:var(--border);margin:8px 0}
.snap-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.snap-row .sl{font-size:12px;color:var(--muted)}
.snap-row .sv{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;color:var(--text)}
.snap-row.og .sv{color:var(--green)}
.snap-grand{margin-top:10px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.gl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.gv{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--gold-l)}
.snap-wm{font-size:9px;color:var(--dim);text-align:center;margin-top:10px;letter-spacing:.05em}
.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.modal-btn{padding:13px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;border:none;transition:opacity .2s}
.modal-btn:active{opacity:.8}
.modal-btn.dl{background:linear-gradient(135deg,#D4A830,#A8862E);color:#0E0C09}
.modal-btn.wa{background:linear-gradient(135deg,#25D366,#1DA851);color:#fff}

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
#toast{position:fixed;bottom:calc(24px + var(--safe-bot));left:50%;transform:translateX(-50%);background:#1E1C10;border:1px solid var(--gold);color:var(--gold-l);font-size:13px;padding:10px 20px;border-radius:30px;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5);display:none}
#toast.error{border-color:var(--red);color:#F08080;background:#1E1010}

.ornament{text-align:center;color:var(--dim);font-size:12px;letter-spacing:.3em;margin:16px 0 0}
</style>
</head>
<body>

<!-- Install Banner -->
<div id="installBanner">
  <div class="ib-icon">📲</div>
  <div class="ib-text">
    <strong>Install Gold Calculator</strong>
    <span>Add to home screen for offline use</span>
  </div>
  <button class="ib-btn" onclick="installApp()">Install</button>
  <button class="ib-close" onclick="this.closest('#installBanner').style.display='none'">✕</button>
</div>

<!-- Header -->
<div class="header">
  <div class="header-icon">♦</div>
  <h1>Gold Jewellery Calculator</h1>
  <p>Multi-Shop · Live Rates</p>
</div>

<!-- Live Rate Banner -->
<div class="live-banner">
  <div class="lb-left">
    <div id="sourceTag" class="source-tag">
      <span id="sourceDot"></span>
      <span id="sourceLabel">tnagarlks.com</span>
    </div>
    <span class="lb-rate-val" id="chip22">—</span>
    <span class="lb-ref">22K ref</span>
    <span id="rateTime"></span>
  </div>
  <button class="update-btn" id="updateRateBtn" onclick="fetchLiveRates()">
    <span class="spin">↻</span>
    <span class="btn-txt">Update Rate</span>
  </button>
</div>

<!-- Sub-rate chips inside banner -->
<div style="margin:6px 12px 0">
  <div class="rate-chips">
    <div class="r-chip"><div class="rl">18K</div><div class="rv" id="chip18">—</div></div>
    <div class="r-chip"><div class="rl">22K</div><div class="rv active" id="chip22b">—</div></div>
    <div class="r-chip"><div class="rl">24K</div><div class="rv" id="chip24">—</div></div>
    <div class="r-chip"><div class="rl">Silver</div><div class="rv" id="chipSilver">—</div></div>
  </div>
</div>

<!-- Tabs -->
<div class="tabs-wrapper">
  <div class="tab-bar" id="tabBar">
    <!-- Shop tabs injected by JS -->
    <div class="tab summary-tab" id="summaryTab" onclick="switchToSummary()">📊 Summary</div>
    <button id="addShopBtn" onclick="addShop()">＋ Add Shop</button>
  </div>
  <button class="copy-all-btn" onclick="copyToAllShops(STATE.activeShopId)">
    ⇉ &nbsp;Copy Details to All Shops &nbsp;<span style="font-size:10px;color:var(--dim);margin-left:2px">(excl. rate &amp; name)</span>
  </button>
</div>

<!-- Main Content Area -->
<div id="mainContent"></div>

<div class="ornament">· ✦ · ✦ · ✦ ·</div>

<!-- Snapshot Modal -->
<div class="modal-bg" id="snapshotModal" style="display:none"
  onclick="if(event.target===this)this.style.display='none'">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">📸 Calculation Snapshot</div>
    <div id="snapCard">
      <div id="snapContent"></div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn dl" onclick="downloadSnapshot()">⬇ &nbsp;Download PNG</button>
      <button class="modal-btn wa" onclick="shareWhatsApp()">💬 &nbsp;Share WhatsApp</button>
    </div>
  </div>
</div>

<input type="hidden" id="snapShopId"/>
<div id="toast"></div>

<!-- Also sync chip22b with chip22 -->
<script>
  // Patch applyLiveRatesToUI to also update chip22b
  const _origApply = applyLiveRatesToUI;
</script>
<script src="app.js"></script>
<script>
  // Patch chip22b after app.js loads
  const _origApplyFn = applyLiveRatesToUI;
  window.applyLiveRatesToUI = function() {
    _origApplyFn();
    const r = STATE.liveRate;
    const c = document.getElementById('chip22b');
    if (c && r.r22) c.textContent = '₹' + r.r22.toLocaleString('en-IN');
    const c22 = document.getElementById('chip22');
    if (c22 && r.r22) c22.textContent = '₹' + r.r22.toLocaleString('en-IN');
  };
</script>
</body>
</html>
